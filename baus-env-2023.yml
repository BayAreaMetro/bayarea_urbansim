# This environment pins dependencies at specific versions, to ensure consistent model
# behavior. It also pins some of the more important sub-dependencies.

# Install this environment by running `conda env create -f baus-env-2023.yml`

name: baus-env-2023

channels:
  - conda-forge

dependencies:
  - pip
  - python=3.6
  - numpy=1.17
  - orca=1.5
  - orca_test=0.1
  - pandana=0.4
  - pandas<1.0
  - scikit-learn=0.22
  - statsmodels=0.11
  - pyyaml<6.0
  - slack_sdk
  - holidays
  - pip:
    - asana==3.2.1
    - git+https://github.com/BayAreaMetro/urbansim_defaults.git
    - git+https://github.com/BayAreaMetro/urbansim.git@master
