# list the columns defining the parcel classes
zoningmodcat_cols: ["gg_id", "exd_id", "tra_id", "toc_id","hra_id", "ppa_id", "ugb_id"]

#input_file: "basis_inputs/crosswalks/fbp_urbansim_parcel_classes.csv"
